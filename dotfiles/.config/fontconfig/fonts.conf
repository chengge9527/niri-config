<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  
  <!-- 1. 默认无衬线字体 (Sans-serif) -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Noto Sans CJK SC</family>
      <family>Noto Sans CJK TC</family>
      <family>Noto Sans CJK JP</family>
    </prefer>
  </alias>
  
  <!-- 2. 默认衬线字体 (Serif) -->
  <alias>
    <family>serif</family>
    <prefer>
      <family>Noto Serif CJK SC</family>
      <family>Noto Serif CJK TC</family>
      <family>Noto Serif CJK JP</family>
    </prefer>
  </alias>

  <!-- 3. 默认等宽字体 (Monospace) -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DejaVu Sans Mono</family>    <!-- 英文等宽 -->
      <family>Noto Sans Mono CJK SC</family> <!-- 中文等宽回退 -->
    </prefer>
  </alias>
  
  <!-- 4. 渲染优化设置 -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>   <!-- 开启抗锯齿 -->
    <edit name="hinting" mode="assign"><bool>true</bool></edit>      <!-- 开启微调 -->
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit> <!-- 建议轻微微调 -->
    <edit name="rgba" mode="assign"><const>rgb</const></edit>        <!-- 屏幕次像素排列 -->
    <edit name="autohint" mode="assign"><bool>false</bool></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit> <!-- LCD 过滤 -->
  </match>

</fontconfig>
